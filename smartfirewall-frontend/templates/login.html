<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>smart-envo Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            animation: float 20s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-100px) translateX(50px); }
            50% { transform: translateY(-200px) translateX(-50px); }
            75% { transform: translateY(-100px) translateX(100px); }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 420px;
            z-index: 10;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 24px;
        }

        .logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .logo svg {
            width: 40px;
            height: 40px;
            stroke: white;
            stroke-width: 2;
            fill: none;
        }

        h1 {
            color: #2d3748;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #718096;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0fdf4;
            border-radius: 20px;
            font-size: 12px;
            color: #16a34a;
            font-weight: 600;
            margin-top: 10px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .error-box {
            margin-top: 15px;
            padding: 12px;
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 8px;
            font-size: 14px;
            text-align: center;
        }

        .section {
            margin-top: 20px;
        }

        .divider {
            margin: 22px 0;
            border: none;
            border-top: 1px solid #e5e7eb;
        }

        .input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 14px;
            margin-bottom: 12px;
            outline: none;
        }

        .input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
        }

        .btn {
            width: 100%;
            padding: 12px 14px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            opacity: 0.95;
        }

        .google-wrap {
            text-align: center;
        }

        .muted {
            color: #718096;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
        }

        .footer {
            text-align: center;
            margin-top: 28px;
            color: #718096;
            font-size: 13px;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
                margin: 20px;
            }

            h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="particles">
        <div class="particle" style="width: 80px; height: 80px; left: 10%; top: 20%; animation-delay: 0s;"></div>
        <div class="particle" style="width: 60px; height: 60px; left: 80%; top: 30%; animation-delay: 2s;"></div>
        <div class="particle" style="width: 40px; height: 40px; left: 70%; top: 60%; animation-delay: 4s;"></div>
        <div class="particle" style="width: 50px; height: 50px; left: 20%; top: 70%; animation-delay: 6s;"></div>
        <div class="particle" style="width: 70px; height: 70px; left: 50%; top: 10%; animation-delay: 8s;"></div>
    </div>

    <div class="login-container">
        <div class="logo-container">
            <div class="logo">
                <svg viewBox="0 0 24 24">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1>smart-envo</h1>
            <p class="subtitle">Sign in to continue</p>

            {% if error %}
            <div class="error-box">{{ error }}</div>
            {% endif %}

            <div class="status-indicator">
                <div class="status-dot"></div>
                smart-envo active
            </div>
        </div>

        {% if local_login_enabled %}
        <div class="section">
            <form method="POST" action="/login">
                <input class="input" type="email" name="email" placeholder="Admin email" required>
                <input class="input" type="password" name="password" placeholder="Password" required>
                <button class="btn btn-primary" type="submit">Sign in</button>
            </form>
            <p class="muted">Local admin login</p>
        </div>
        {% endif %}

        {% if google_enabled %}
        <hr class="divider">
        <div class="section google-wrap">
            <a href="/google-login">
                <img src="https://developers.google.com/identity/images/btn_google_signin_dark_normal_web.png"
                     alt="Sign in with Google"
                     style="width:220px;">
            </a>
            <p class="muted">Google sign-in</p>
        </div>
        {% endif %}

        <div class="footer">
            <p>Protected by <a href="#">smart-envo</a></p>
        </div>
    </div>
</body>
</html>
