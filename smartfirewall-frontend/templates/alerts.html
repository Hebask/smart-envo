{% extends "base.html" %}
{% block title %}smart-envo Alerts{% endblock %}

{% block content %}

<style>
    .user-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 20px;
        margin-top: 20px;
    }
    .user-card {
        background: white;
        border-radius: 16px;
        padding: 25px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        transition: all 0.3s ease;
        border: 2px solid transparent;
    }
    .user-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        border-color: #667eea;
    }
    .user-header {
        display: flex;
        align-items: center;
        gap: 15px;
        margin-bottom: 20px;
        padding-bottom: 20px;
        border-bottom: 2px solid #f7fafc;
    }
    .user-avatar-large {
        width: 70px;
        height: 70px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: white;
        position: relative;
    }
    .user-avatar-large::after {
        content: '';
        position: absolute;
        bottom: 2px;
        right: 2px;
        width: 18px;
        height: 18px;
        background: #10b981;
        border: 3px solid white;
        border-radius: 50%;
    }
    .user-role {
        display: inline-block;
        padding: 4px 12px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 600;
        background: #e0e7ff;
        color: #3730a3;
    }
</style>

<header class="header">
  <div class="header-left">
    <h1>Alerts</h1>
    <p>System alerts and important firewall events</p>
  </div>
</header>

<div class="card">
  <div id="alerts-list"></div>
</div>

<script>

const API_BASE = window.API_BASE;
async function api(path, options = {}) { return await apiFetch(path, options); }

async function loadAlerts() {
  try {
    
    const data = await api("/api/alerts?limit=50");
    if (!data.ok) throw new Error(data.error || "Failed to load alerts");

    renderAlerts(data.alerts || []);

  } catch (e) {
    console.error(e);
    alert("Could not load alerts.");
  }
}

function renderAlerts(alerts) {

  const container = document.getElementById("alerts-list");
  if (!container) return;

  if (!alerts.length) {
    container.innerHTML =
      `<div style="padding:20px;">No alerts yet.</div>`;
    return;
  }

  container.innerHTML = alerts.map(a => `
    <div class="user-card" style="margin-bottom:16px;">
      <div class="user-header">
        <div class="user-avatar-large" style="background:${
          a.level === "critical"
          ? "#dc2626"
          : a.level === "warning"
          ? "#f59e0b"
          : "#10b981"}">
          !
        </div>
        <div>
          <h3>${a.title}</h3>
          <span class="user-role">${a.level} • ${a.category}</span>
        </div>
      </div>

      <p style="margin-bottom:12px;">${a.message}</p>

      <div style="font-size:13px;color:#718096;">
        ${a.ts || ""}
        ${a.device_mac ? `• Device: ${a.device_mac}` : ""}
      </div>

    </div>
  `).join("");

}

document.addEventListener("DOMContentLoaded", loadAlerts);

</script>

{% endblock %}
