{% extends "base.html" %}
{% block title %}smart-envo Service Restrictions{% endblock %}

{% block content %}

<style>
/* Header */
.services-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    padding: 20px 24px;
    border-radius: 16px;
}

.services-header h1 {
    font-size: 26px;
    font-weight: 700;
    color: #ffffff;
}

.services-header p {
    color: #e5e7eb;
    margin-top: 4px;
}

/* Stats */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 20px;
    margin-bottom: 25px;
}

.stat-card {
    background: white;
    padding: 20px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.stat-card h3 {
    font-size: 14px;
    color: #6b7280;
}

.stat-card span {
    font-size: 26px;
    font-weight: 700;
    color: #111827;
}

.stat-icon {
    font-size: 22px;
    padding: 12px;
    border-radius: 12px;
    background: #eef2ff;
    color: #4f46e5;
}

/* Filters */
.filter-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.filter-tabs button {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid #e5e7eb;
    background: white;
    cursor: pointer;
}

.filter-tabs .active {
    background: #111827;
    color: white;
}

/* Service Cards */
.service-card {
    background: white;
    padding: 22px;
    border-radius: 16px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    position: relative;
    transition: 0.3s;
    gap: 20px;
}

.service-left {
    display: flex;
    gap: 16px;
    align-items: center;
    min-width: 0;
}

.service-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    background: #dcfce7;
    color: #16a34a;
    flex-shrink: 0;
}

.service-icon.disabled {
    background: #f1f5f9;
    color: #94a3b8;
}

.service-info h4 {
    font-size: 16px;
    font-weight: 600;
    color: #1f2937;
    margin: 0 0 6px 0;
}

.service-info p {
    font-size: 13px;
    color: #6b7280;
    margin: 0;
}

.service-tags {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    flex-wrap: wrap;
}

.tag {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 20px;
    font-weight: 600;
}

.tag.enabled {
    background: #dcfce7;
    color: #16a34a;
}

.tag.disabled {
    background: #fee2e2;
    color: #dc2626;
}

.tag.category {
    background: #e0e7ff;
    color: #4338ca;
}

.tag.scope {
    background: #f3f4f6;
    color: #374151;
}

/* Actions */
.service-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

/* Toggle Switch */
.toggle-switch {
    position: relative;
    width: 46px;
    height: 24px;
}

.toggle-switch input[type="checkbox"] {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    cursor: pointer;
    top:0; left:0;
    right:0; bottom:0;
    background: #e5e7eb;
    border-radius: 20px;
    transition: 0.4s;
}

.slider:before {
    position: absolute;
    content:"";
    height: 18px;
    width: 18px;
    left: 3px;
    bottom: 3px;
    background: white;
    border-radius: 50%;
    transition: 0.4s;
}

.toggle-switch input:checked + .slider {
    background: #15c644;
}

.toggle-switch input:checked + .slider:before {
    transform: translateX(22px);
}

.icon-btn {
    background: none;
    color:#dc2626;
    border: 1px solid #f6f6f6;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
}

.empty-state {
    background: white;
    border-radius: 16px;
    padding: 24px;
    color: #6b7280;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
}

.btn-outline {
    border: 1px solid #e5e7eb;
    background: white;
    color: #111827;
}

.btn-danger {
    color: #dc2626;
}

@media (max-width: 900px) {
    .service-card {
        flex-direction: column;
        align-items: stretch;
    }

    .service-actions {
        justify-content: flex-start;
    }
}
</style>

<div class="services-header">
    <div>
        <h1>smart-envo Service Restrictions</h1>
        <p>Manage service-domain rules and their target restrictions</p>
    </div>
    <button class="btn btn-primary" onclick="createService()">
        <i class="fa-solid fa-plus"></i> Add Service
    </button>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <div>
            <h3>Total Services</h3>
            <span id="services-total">0</span>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-screwdriver-wrench"></i></div>
    </div>

    <div class="stat-card">
        <div>
            <h3>Enabled Services</h3>
            <span id="services-enabled">0</span>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-circle-check"></i></div>
    </div>

    <div class="stat-card">
        <div>
            <h3>Disabled Services</h3>
            <span id="services-disabled">0</span>
        </div>
        <div class="stat-icon"><i class="fa-solid fa-circle-xmark"></i></div>
    </div>
</div>

<div class="filter-tabs" id="service-filters"></div>
<div id="services-list"></div>

<script>
async function api(path, options = {}) { return await apiFetch(path, options); }

let ALL_SERVICES = [];
let CURRENT_FILTER = "all";

function escapeHtml(str) {
    return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
}

function serviceIconClass(service) {
    return Number(service.enabled) === 1 ? "service-icon" : "service-icon disabled";
}

function getCategory(service) {
    return (service.category || "Uncategorized").trim() || "Uncategorized";
}

function getScope(service) {
    const appliesTo = (service.applies_to || "all").trim() || "all";
    if (appliesTo === "device" && service.device_mac) return `Device: ${service.device_mac}`;
    if (appliesTo === "group" && service.group_id) return `Group: ${service.group_id}`;
    return appliesTo;
}

function updateStats() {
    const total = ALL_SERVICES.length;
    const enabled = ALL_SERVICES.filter(s => Number(s.enabled) === 1).length;
    const disabled = total - enabled;

    document.getElementById("services-total").textContent = total;
    document.getElementById("services-enabled").textContent = enabled;
    document.getElementById("services-disabled").textContent = disabled;
}

function renderFilters() {
    const root = document.getElementById("service-filters");
    if (!root) return;

    const categories = Array.from(new Set(
        ALL_SERVICES.map(s => getCategory(s)).filter(Boolean)
    )).sort((a, b) => a.localeCompare(b));

    const filters = ["all", ...categories];

    root.innerHTML = filters.map(f => {
        const active = CURRENT_FILTER === f ? "active" : "";
        const label = f === "all" ? "All" : f;
        return `<button class="${active}" onclick="setServiceFilter('${escapeHtml(f)}')">${escapeHtml(label)}</button>`;
    }).join("");
}

function renderServices() {
    const root = document.getElementById("services-list");
    if (!root) return;

    const services = ALL_SERVICES.filter(s => {
        if (CURRENT_FILTER === "all") return true;
        return getCategory(s) === CURRENT_FILTER;
    });

    if (!services.length) {
        root.innerHTML = `<div class="empty-state">No services found.</div>`;
        return;
    }

    root.innerHTML = services.map(service => {
        const enabled = Number(service.enabled) === 1;
        const statusTag = enabled
            ? `<span class="tag enabled">Enabled</span>`
            : `<span class="tag disabled">Disabled</span>`;

        return `
            <div class="service-card">
                <div class="service-left">
                    <div class="${serviceIconClass(service)}">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div class="service-info">
                        <h4>${escapeHtml(service.name || "Unnamed Service")}</h4>
                        <p>${escapeHtml(service.description || "No description")}</p>
                        <div class="service-tags">
                            ${statusTag}
                            <span class="tag category">${escapeHtml(getCategory(service))}</span>
                            <span class="tag scope">${escapeHtml(getScope(service))}</span>
                        </div>
                    </div>
                </div>

                <div class="service-actions">
                    <button class="btn btn-outline" onclick="editService(${service.id})">Edit</button>
                    <button class="btn btn-outline" onclick="manageDomains(${service.id}, '${escapeHtml(service.name || "Service")}')">Domains</button>

                    <label class="toggle-switch" title="${enabled ? "Disable" : "Enable"}">
                        <input type="checkbox" ${enabled ? "checked" : ""} onchange="toggleService(${service.id}, this.checked)">
                        <span class="slider"></span>
                    </label>

                    <button class="icon-btn" onclick="deleteService(${service.id})">
                        <i class="fa-solid fa-trash"></i>
                    </button>
                </div>
            </div>
        `;
    }).join("");
}

function setServiceFilter(filter) {
    CURRENT_FILTER = filter;
    renderFilters();
    renderServices();
}

async function loadServices() {
    const root = document.getElementById("services-list");
    if (root) root.innerHTML = `<div class="empty-state">Loading services...</div>`;
    try {
        const data = await api("/api/services");
        const services = Array.isArray(data) ? data : (data.services || []);
        ALL_SERVICES = services;
        updateStats();
        renderFilters();
        renderServices();
    } catch (e) {
        console.error(e);
        alert("Failed to load services.");
    }
}

async function createService() {
    const name = prompt("Service name?");
    if (!name) return;

    const description = prompt("Description?", "") ?? "";
    const category = prompt("Category? (Security / Monitoring / Parental Control / Network)", "") ?? "";
    const applies_to = (prompt("Applies to? (all / device / group)", "all") || "all").trim();

    let device_mac = "";
    let group_id = null;

    if (applies_to === "device") {
    device_mac = (prompt("Device MAC? (format: aa:bb:cc:dd:ee:ff)", "") || "").trim().toLowerCase();
    const macRegex = /^([0-9a-f]{2}:){5}[0-9a-f]{2}$/;
    if (device_mac && !macRegex.test(device_mac)) {
        alert("Invalid MAC address format. Expected: aa:bb:cc:dd:ee:ff");
        return;
    }
} else if (applies_to === "group") {
        const groupValue = prompt("Group ID?", "");
        if (groupValue === null) return;
        group_id = groupValue ? Number(groupValue) : null;
    }

    const enabledInput = prompt("Enabled? (yes/no)", "yes");
    if (enabledInput === null) return;
    const enabled = !["no", "0", "false"].includes(enabledInput.trim().toLowerCase());

    try {
        await api("/api/services", {
            method: "POST",
            body: JSON.stringify({
                name: name.trim(),
                description: description.trim(),
                category: category.trim(),
                enabled,
                applies_to,
                device_mac,
                group_id
            })
        });
        await loadServices();
        alert("Service created.");
    } catch (e) {
        console.error(e);
        alert("Failed to create service.");
    }
}

async function editService(serviceId) {
    try {
        const data = await api(`/api/services/${serviceId}`, { method: "GET" });
        const service = data.service;

        if (!service) {
            alert("Service not found.");
            return;
        }

        const name = prompt("Service name:", service.name || "");
        if (name === null || !name.trim()) return;

        const description = prompt("Description:", service.description || "");
        if (description === null) return;

        const category = prompt("Category:", service.category || "");
        if (category === null) return;

        const applies_to = (prompt("Applies to? (all / device / group)", service.applies_to || "all") || "all").trim();
        if (!applies_to) return;

        let device_mac = "";
        let group_id = null;

        if (applies_to === "device") {
    const deviceValue = prompt("Device MAC: (format: aa:bb:cc:dd:ee:ff)", service.device_mac || "");
    if (deviceValue === null) return;
    device_mac = deviceValue.trim().toLowerCase();
    const macRegex = /^([0-9a-f]{2}:){5}[0-9a-f]{2}$/;
    if (device_mac && !macRegex.test(device_mac)) {
        alert("Invalid MAC address format. Expected: aa:bb:cc:dd:ee:ff");
        return;
    }
} else if (applies_to === "group") {
            const groupValue = prompt("Group ID:", service.group_id ?? "");
            if (groupValue === null) return;
            group_id = groupValue ? Number(groupValue) : null;
        }

        await api(`/api/services/${serviceId}`, {
            method: "PUT",
            body: JSON.stringify({
                name: name.trim(),
                description: description.trim(),
                category: category.trim(),
                enabled: Number(service.enabled) === 1,
                applies_to,
                device_mac,
                group_id
            })
        });

        await loadServices();
        alert("Service updated.");
    } catch (e) {
        console.error(e);
        alert("Failed to update service.");
    }
}

async function toggleService(serviceId, shouldEnable) {
    try {
        await api(
            shouldEnable
                ? `/api/services/${serviceId}/enable`
                : `/api/services/${serviceId}/disable`,
            { method: "POST" }
        );

        await loadServices();
    } catch (e) {
        console.error(e);
        alert("Failed to update service status.");
        await loadServices();
    }
}

async function deleteService(serviceId) {
    const ok = confirm("Delete this service?");
    if (!ok) return;

    try {
        await api(`/api/services/${serviceId}`, { method: "DELETE" });
        await loadServices();
        alert("Service deleted.");
    } catch (e) {
        console.error(e);
        alert("Failed to delete service.");
    }
}

async function manageDomains(serviceId, serviceName) {
    try {
        const data = await api(`/api/services/${serviceId}/domains`, { method: "GET" });
        const domains = Array.isArray(data) ? data : (data.domains || []);

        let message = `Domains for ${serviceName}\n\n`;
        if (domains.length) {
            domains.forEach(d => {
                message += `ID ${d.id}: ${d.domain} ${Number(d.enabled) === 1 ? "[enabled]" : "[disabled]"}\n`;
            });
        } else {
            message += "No domains yet.\n";
        }

        message += `\nCommands:
+domain.com   add domain
e<ID>         enable domain row
d<ID>         disable domain row
x<ID>         delete domain row`;

        const input = prompt(message);
        if (!input) return;

        const value = input.trim();

        if (value.startsWith("+")) {
            const domain = value.slice(1).trim();
            if (!domain) {
                alert("Invalid domain.");
                return;
            }
            await addServiceDomain(serviceId, domain);
            return;
        }

        if (value.startsWith("e")) {
            const domainId = Number(value.slice(1));
            if (!domainId) {
                alert("Invalid domain row id.");
                return;
            }
            await enableServiceDomain(domainId);
            return;
        }

        if (value.startsWith("d")) {
            const domainId = Number(value.slice(1));
            if (!domainId) {
                alert("Invalid domain row id.");
                return;
            }
            await disableServiceDomain(domainId);
            return;
        }

        if (value.startsWith("x")) {
            const domainId = Number(value.slice(1));
            if (!domainId) {
                alert("Invalid domain row id.");
                return;
            }
            await deleteServiceDomain(domainId);
            return;
        }

        alert("Unknown command.");
    } catch (e) {
        console.error(e);
        alert("Failed to manage service domains.");
    }
}

async function addServiceDomain(serviceId, domain) {
    const trimmed = (domain || "").trim().toLowerCase();
    if (!trimmed || !trimmed.includes(".") || trimmed.includes(" ")) {
        alert("Invalid domain. Example: tiktok.com");
        return;
    }
    try {
        await api(`/api/services/${serviceId}/domains`, {
            method: "POST",
            body: JSON.stringify({ domain })
        });
        alert("Domain added.");
    } catch (e) {
        console.error(e);
        alert("Failed to add domain.");
    }
}

async function enableServiceDomain(domainId) {
    try {
        await api(`/api/services/domains/${domainId}/enable`, { method: "POST" });
        alert("Domain enabled.");
    } catch (e) {
        console.error(e);
        alert("Failed to enable domain.");
    }
}

async function disableServiceDomain(domainId) {
    try {
        await api(`/api/services/domains/${domainId}/disable`, { method: "POST" });
        alert("Domain disabled.");
    } catch (e) {
        console.error(e);
        alert("Failed to disable domain.");
    }
}

async function deleteServiceDomain(domainId) {
    try {
        await api(`/api/services/domains/${domainId}`, { method: "DELETE" });
        alert("Domain deleted.");
    } catch (e) {
        console.error(e);
        alert("Failed to delete domain.");
    }
}

document.addEventListener("DOMContentLoaded", loadServices);

window.createService = createService;
window.editService = editService;
window.toggleService = toggleService;
window.deleteService = deleteService;
window.manageDomains = manageDomains;
</script>

{% endblock %}
